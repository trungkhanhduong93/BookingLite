<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="trung.duong (Trum)">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta name="theme-color" content="#F26522">
  <title>Lịch đặt bàn — Booking Lite</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: '#F26522', 'brand-dark': '#D9531A', 'brand-bg': '#FFF7F2', ipos: '#00A88E', 'ipos-dark': '#00806C', 'ipos-bg': '#E8F7F3' } } } }
  </script>
  <style>
    [data-theme="light"] { --p: 19 89% 54%; --pf: 19 89% 46%; --pc: 0 0% 100%; }
    html, body { font-family: 'Be Vietnam Pro', sans-serif; }
    body { background-image: radial-gradient(34rem 22rem at 100% -6%, rgba(242,101,34,.10), transparent 60%), radial-gradient(34rem 22rem at 0% -6%, rgba(0,168,142,.10), transparent 60%), radial-gradient(rgba(15,23,42,.05) 1px, transparent 1px); background-size: 100% 100%, 100% 100%, 22px 22px; background-attachment: fixed; }
    .navlink.active { background: hsl(var(--p)); color: #fff; } .navlink.active i { color: #fff; }
  </style>
</head>
<body class="bg-base-200 min-h-screen">
  <div class="drawer lg:drawer-open">
    <input id="nav" type="checkbox" class="drawer-toggle" />
    <div class="drawer-content flex flex-col min-h-screen">

      <header class="navbar bg-base-100 border-b border-base-200 sticky top-0 z-30 px-4">
        <label for="nav" class="btn btn-ghost btn-sm btn-circle lg:hidden mr-1"><i data-lucide="menu" class="w-5 h-5"></i></label>
        <div class="flex-1"><h1 class="text-lg font-bold">Lịch đặt bàn</h1></div>
        <div class="flex-none gap-1.5">
          <button class="btn btn-primary btn-sm gap-1"><i data-lucide="plus" class="w-4 h-4"></i> <span class="hidden sm:inline">Thêm đơn</span></button>
          <div class="avatar placeholder"><div class="bg-brand text-white rounded-full w-9"><span class="text-sm">TQ</span></div></div>
        </div>
      </header>

      <main class="p-4 sm:p-6 flex-1 space-y-4">

        <!-- Thanh điều hướng ngày -->
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div class="flex items-center gap-2">
            <button class="btn btn-ghost btn-sm btn-circle"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
            <div class="text-center">
              <p class="font-bold">Thứ 3, 30/06/2026</p>
              <p class="text-xs text-base-content/50">8 đơn · 34 khách</p>
            </div>
            <button class="btn btn-ghost btn-sm btn-circle"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
            <button class="btn btn-outline btn-sm ml-1">Hôm nay</button>
          </div>
          <div class="tabs tabs-boxed bg-base-100 border border-base-200">
            <a class="tab tab-active">Ngày</a>
            <a class="tab">Tuần</a>
          </div>
        </div>

        <!-- Chú thích -->
        <div class="flex flex-wrap gap-3 text-xs text-base-content/60">
          <span class="inline-flex items-center gap-1"><span class="w-3 h-3 rounded bg-warning"></span> Chờ xác nhận</span>
          <span class="inline-flex items-center gap-1"><span class="w-3 h-3 rounded bg-success"></span> Đã xác nhận</span>
          <span class="inline-flex items-center gap-1"><span class="w-3 h-3 rounded bg-base-300"></span> Đã huỷ</span>
        </div>

        <!-- Timeline theo khung giờ -->
        <div class="card bg-base-100 shadow-sm border border-base-200">
          <div class="card-body p-0 divide-y divide-base-200" id="timeline"></div>
        </div>

        <p class="text-xs text-base-content/40 text-center pt-2">Tác giả: trung.duong (Trum)</p>
      </main>
    </div>

    <div class="drawer-side z-40">
      <label for="nav" class="drawer-overlay"></label>
      <aside class="w-64 min-h-full bg-base-100 border-r border-base-200 flex flex-col">
        <div class="p-4 border-b border-base-200">
          <a href="index.html" class="text-xl font-bold text-brand inline-flex items-center gap-2"><i data-lucide="utensils-crossed" class="w-6 h-6"></i> Booking<span class="text-base-content">Lite</span></a>
          <div class="mt-3 flex items-center gap-2 bg-brand-bg rounded-lg p-2">
            <div class="avatar placeholder"><div class="bg-brand text-white rounded-lg w-9"><span class="text-sm">TQ</span></div></div>
            <div class="leading-tight"><p class="text-sm font-semibold">Trum Quán</p><p class="text-[11px] text-base-content/50">Gói Pro · TP.HCM</p></div>
          </div>
        </div>
        <ul class="menu p-3 gap-1 flex-1 text-[15px]">
          <li><a href="dashboard.html" class="navlink"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Tổng quan</a></li>
          <li><a href="lich.html" class="navlink active"><i data-lucide="calendar-days" class="w-5 h-5"></i> Lịch đặt bàn</a></li>
          <li><a href="ban.html" class="navlink"><i data-lucide="grid-3x3" class="w-5 h-5"></i> Sơ đồ bàn</a></li>
          <li><a href="khach-hang.html" class="navlink"><i data-lucide="contact" class="w-5 h-5"></i> Khách hàng</a></li>
          <li><a href="bao-cao.html" class="navlink"><i data-lucide="bar-chart-3" class="w-5 h-5"></i> Báo cáo</a></li>
          <li><a href="cai-dat.html" class="navlink"><i data-lucide="settings" class="w-5 h-5"></i> Cài đặt quán</a></li>
        </ul>
        <div class="p-3 border-t border-base-200 space-y-1">
          <a href="../end-user/index.html" target="_blank" class="btn btn-outline btn-primary btn-sm btn-block gap-1"><i data-lucide="external-link" class="w-4 h-4"></i> Xem trang đặt bàn</a>
          <a href="index.html" class="btn btn-ghost btn-sm btn-block gap-1 text-base-content/60"><i data-lucide="log-out" class="w-4 h-4"></i> Đăng xuất</a>
        </div>
      </aside>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    const SLOTS = {
      '11:30': [{ name:'Đỗ Quỳnh Chi', g:2, t:'B02', s:'cancelled' }],
      '12:00': [{ name:'Vũ Đức Thắng', g:5, t:'B07', s:'confirmed' }],
      '18:30': [{ name:'Lê Hoàng Anh', g:6, t:'B05', s:'confirmed' }],
      '19:00': [{ name:'Trần Thu Hà', g:4, t:'B03', s:'confirmed' }],
      '19:30': [{ name:'Nguyễn Văn Minh', g:2, t:'—', s:'pending' }],
      '20:00': [{ name:'Phạm Thị Lan', g:3, t:'—', s:'pending' }],
      '20:30': [{ name:'Hoàng Nam', g:8, t:'B10', s:'confirmed' }],
      '21:00': [{ name:'Bùi Khánh Linh', g:4, t:'—', s:'pending' }],
    };
    const TIMES = ['11:00','11:30','12:00','12:30','17:30','18:00','18:30','19:00','19:30','20:00','20:30','21:00'];
    const C = { pending:'border-warning bg-warning/10', confirmed:'border-success bg-success/10', cancelled:'border-base-300 bg-base-200 opacity-70 line-through' };
    document.getElementById('timeline').innerHTML = TIMES.map(t => {
      const items = SLOTS[t] || [];
      const cards = items.length ? items.map(b => `
        <a href="booking-detail.html" class="flex items-center gap-2 border-l-4 ${C[b.s]} rounded-r-lg px-3 py-2 hover:shadow-sm transition">
          <span class="font-medium text-sm">${b.name}</span>
          <span class="text-xs text-base-content/50 inline-flex items-center gap-1"><i data-lucide="users" class="w-3 h-3"></i>${b.g}</span>
          <span class="text-xs text-base-content/50 ml-auto inline-flex items-center gap-1"><i data-lucide="armchair" class="w-3 h-3"></i>${b.t}</span>
        </a>`).join('')
        : `<p class="text-xs text-base-content/30 px-3 py-2">Trống</p>`;
      return `<div class="flex gap-3 px-4 py-2">
        <div class="w-12 shrink-0 text-sm font-semibold text-base-content/70 pt-2">${t}</div>
        <div class="flex-1 space-y-1.5">${cards}</div>
      </div>`;
    }).join('');
    lucide.createIcons();
  </script>
</body>
</html>
