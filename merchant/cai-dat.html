<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="trung.duong (Trum)">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta name="theme-color" content="#F26522">
  <title>Cài đặt quán — Booking Lite</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: '#F26522', 'brand-dark': '#D9531A', 'brand-bg': '#FFF7F2', ipos: '#0067B1', 'ipos-dark': '#00528C', 'ipos-bg': '#E7F1FA' } } } }
  </script>
  <style>
    [data-theme="light"] { --p: 19 89% 54%; --pf: 19 89% 46%; --pc: 0 0% 100%; }
    html, body { font-family: 'Be Vietnam Pro', sans-serif; }
    body { background-image: radial-gradient(34rem 22rem at 100% -6%, rgba(242,101,34,.10), transparent 60%), radial-gradient(34rem 22rem at 0% -6%, rgba(0,103,177,.10), transparent 60%), radial-gradient(rgba(15,23,42,.05) 1px, transparent 1px); background-size: 100% 100%, 100% 100%, 22px 22px; background-attachment: fixed; }
    .navlink.active { background: hsl(var(--p)); color: #fff; } .navlink.active i { color: #fff; }
    .toggle:checked { --tglbg: hsl(var(--p)); background-color: hsl(var(--p)); border-color: hsl(var(--p)); }
  
    /* View Transition SPA config */
    .drawer-side { view-transition-name: sidebar; }
    .navbar { view-transition-name: topbar; }
    main { animation: springFadeIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    @keyframes springFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
<meta name="view-transition" content="same-origin" />
</head>
<body class="bg-base-200 min-h-screen">
  <div class="drawer lg:drawer-open">
    <input id="nav" type="checkbox" class="drawer-toggle" />
    <div class="drawer-content flex flex-col min-h-screen">

      <header class="navbar bg-base-100 border-b border-base-200 sticky top-0 z-30 px-4">
        <label for="nav" class="btn btn-ghost btn-sm btn-circle lg:hidden mr-1"><i data-lucide="menu" class="w-5 h-5"></i></label>
        <div class="flex-1"><h1 class="text-lg font-bold">Cài đặt quán</h1></div>
        <div class="flex-none gap-1.5">
          <button class="btn btn-primary btn-sm gap-1"><i data-lucide="save" class="w-4 h-4"></i> Lưu</button>
          <div class="avatar placeholder"><div class="bg-brand text-white rounded-full w-9"><span class="text-sm">TQ</span></div></div>
        </div>
      </header>

      <main class="p-4 sm:p-6 flex-1 max-w-3xl w-full mx-auto space-y-5">

        <!-- Thông tin quán -->
        <div class="card bg-base-100 shadow-sm border border-base-200"><div class="card-body gap-4">
          <h2 class="font-bold flex items-center gap-2"><i data-lucide="store" class="w-5 h-5 text-brand"></i> Thông tin quán</h2>
          <div class="grid sm:grid-cols-2 gap-4">
            <div><label class="label py-1"><span class="label-text">Tên quán</span></label><input value="Nhà hàng Trum Quán" class="input input-bordered w-full"></div>
            <div><label class="label py-1"><span class="label-text">Loại hình</span></label><input value="Nhà hàng · Fine dining" class="input input-bordered w-full"></div>
            <div class="sm:col-span-2"><label class="label py-1"><span class="label-text">Địa chỉ</span></label><input value="77 Trần Nhân Tôn, Phường An Đông, TP.HCM" class="input input-bordered w-full"></div>
            <div><label class="label py-1"><span class="label-text">Hotline</span></label><input value="1900 4766 Nhánh 3" class="input input-bordered w-full"></div>
            <div><label class="label py-1"><span class="label-text">Sức chứa (số bàn)</span></label><input type="number" value="20" class="input input-bordered w-full"></div>
          </div>
        </div></div>

        <!-- Giờ hoạt động -->
        <div class="card bg-base-100 shadow-sm border border-base-200"><div class="card-body gap-3">
          <h2 class="font-bold flex items-center gap-2"><i data-lucide="clock" class="w-5 h-5 text-brand"></i> Giờ hoạt động</h2>
          <div id="hours" class="divide-y divide-base-200"></div>
        </div></div>

        <!-- Cấu hình nhận đặt -->
        <div class="card bg-base-100 shadow-sm border border-base-200"><div class="card-body gap-4">
          <h2 class="font-bold flex items-center gap-2"><i data-lucide="calendar-cog" class="w-5 h-5 text-brand"></i> Cấu hình nhận đặt bàn</h2>
          <div class="grid sm:grid-cols-3 gap-4">
            <div><label class="label py-1"><span class="label-text">Mỗi khung giờ</span></label><select class="select select-bordered w-full"><option>15 phút</option><option selected>30 phút</option><option>60 phút</option></select></div>
            <div><label class="label py-1"><span class="label-text">Giữ bàn tối đa</span></label><select class="select select-bordered w-full"><option>60 phút</option><option selected>90 phút</option><option>120 phút</option></select></div>
            <div><label class="label py-1"><span class="label-text">Tự huỷ nếu trễ</span></label><select class="select select-bordered w-full"><option>10 phút</option><option selected>15 phút</option><option>Không</option></select></div>
          </div>
          <label class="flex items-center justify-between"><span class="text-sm">Tự động xác nhận đơn mới</span><input type="checkbox" class="toggle toggle-primary"></label>
          <label class="flex items-center justify-between"><span class="text-sm">Yêu cầu đặt cọc với nhóm trên 8 khách</span><input type="checkbox" class="toggle toggle-primary" checked></label>
        </div></div>

        <!-- Link & QR -->
        <div class="card bg-base-100 shadow-sm border border-base-200"><div class="card-body gap-4">
          <h2 class="font-bold flex items-center gap-2"><i data-lucide="link" class="w-5 h-5 text-brand"></i> Link & QR đặt bàn</h2>
          <div class="flex flex-col sm:flex-row gap-4 items-start">
            <div class="flex-1 w-full space-y-2">
              <div class="join w-full"><input readonly value="https://booking-lite.vn/r/trum-quan" class="input input-bordered join-item w-full text-brand"><button class="btn btn-primary join-item"><i data-lucide="copy" class="w-4 h-4"></i></button></div>
              <div class="flex gap-2"><button class="btn btn-outline btn-sm gap-1"><i data-lucide="download" class="w-4 h-4"></i> Tải QR</button><button class="btn btn-outline btn-sm gap-1"><i data-lucide="share-2" class="w-4 h-4"></i> Chia sẻ</button></div>
            </div>
            <div class="w-24 h-24 bg-base-200 rounded-xl flex items-center justify-center text-base-content/40 shrink-0"><i data-lucide="qr-code" class="w-14 h-14"></i></div>
          </div>
        </div></div>

        <!-- Kênh thông báo -->
        <div class="card bg-base-100 shadow-sm border border-base-200"><div class="card-body gap-3">
          <h2 class="font-bold flex items-center gap-2"><i data-lucide="bell" class="w-5 h-5 text-brand"></i> Kênh thông báo</h2>
          <label class="flex items-center justify-between"><span class="text-sm inline-flex items-center gap-2"><i data-lucide="message-square" class="w-4 h-4 text-base-content/50"></i> SMS xác nhận cho khách</span><input type="checkbox" class="toggle toggle-primary" checked></label>
          <label class="flex items-center justify-between"><span class="text-sm inline-flex items-center gap-2"><i data-lucide="send" class="w-4 h-4 text-base-content/50"></i> Zalo ZNS nhắc lịch</span><input type="checkbox" class="toggle toggle-primary" checked></label>
          <label class="flex items-center justify-between"><span class="text-sm inline-flex items-center gap-2"><i data-lucide="mail" class="w-4 h-4 text-base-content/50"></i> Email báo cáo hằng ngày</span><input type="checkbox" class="toggle toggle-primary"></label>
        </div></div>

        <p class="text-xs text-base-content/40 text-center pt-1">Tác giả: trung.duong (Trum)</p>
      </main>
    </div>

    <div class="drawer-side z-40">
      <label for="nav" class="drawer-overlay"></label>
      <aside class="w-64 min-h-full bg-base-100 border-r border-base-200 flex flex-col">
        <div class="p-4 border-b border-base-200">
          <a href="index.html" class="text-xl font-bold text-brand inline-flex items-center gap-2"><i data-lucide="utensils-crossed" class="w-6 h-6"></i> Booking<span class="text-base-content">Lite</span></a>
          <div class="mt-3 flex items-center gap-2 bg-brand-bg rounded-lg p-2">
            <div class="avatar placeholder"><div class="bg-brand text-white rounded-lg w-9"><span class="text-sm">TQ</span></div></div>
            <div class="leading-tight"><p class="text-sm font-semibold">Trum Quán</p><p class="text-[11px] text-base-content/50">Gói Pro · TP.HCM</p></div>
          </div>
        </div>
        <ul class="menu p-3 gap-1 flex-1 text-[15px]">
          <li><a href="dashboard.html" class="navlink"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Tổng quan</a></li>
          <li><a href="lich.html" class="navlink"><i data-lucide="calendar-days" class="w-5 h-5"></i> Lịch đặt bàn</a></li>
          <li><a href="ban.html" class="navlink"><i data-lucide="grid-3x3" class="w-5 h-5"></i> Sơ đồ bàn</a></li>
          <li><a href="khach-hang.html" class="navlink"><i data-lucide="contact" class="w-5 h-5"></i> Khách hàng</a></li>
          <li><a href="bao-cao.html" class="navlink"><i data-lucide="bar-chart-3" class="w-5 h-5"></i> Báo cáo</a></li>
          <li><a href="cai-dat.html" class="navlink active"><i data-lucide="settings" class="w-5 h-5"></i> Cài đặt quán</a></li>
        </ul>
        <div class="p-3 border-t border-base-200 space-y-1">
          <a href="../end-user/index.html" target="_blank" class="btn btn-outline btn-primary btn-sm btn-block gap-1"><i data-lucide="external-link" class="w-4 h-4"></i> Xem trang đặt bàn</a>
          <a href="index.html" class="btn btn-ghost btn-sm btn-block gap-1 text-base-content/60"><i data-lucide="log-out" class="w-4 h-4"></i> Đăng xuất</a>
        </div>
      </aside>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    const DAYS = ['Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7','Chủ nhật'];
    document.getElementById('hours').innerHTML = DAYS.map((d,i) => `
      <div class="flex items-center gap-3 py-2.5">
        <input type="checkbox" class="toggle toggle-primary toggle-sm" ${i<7?'checked':''}>
        <span class="w-20 text-sm font-medium">${d}</span>
        <div class="flex items-center gap-2 text-sm">
          <input value="10:00" class="input input-bordered input-sm w-20 text-center">
          <span class="text-base-content/40">–</span>
          <input value="22:00" class="input input-bordered input-sm w-20 text-center">
        </div>
      </div>`).join('');
    lucide.createIcons();
  </script>
</body>
</html>
