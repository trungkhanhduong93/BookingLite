<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="trung.duong (Trum)">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta name="theme-color" content="#F26522">
  <title>Khách hàng — Booking Lite</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    [data-theme="light"] { --p: 19 89% 54%; --pf: 19 89% 46%; --pc: 0 0% 100%; }
    html, body { font-family: 'Be Vietnam Pro', sans-serif; }
    body { background-image: radial-gradient(34rem 22rem at 100% -6%, rgba(242,101,34,.10), transparent 60%), radial-gradient(34rem 22rem at 0% -6%, rgba(0,103,177,.10), transparent 60%), radial-gradient(rgba(15,23,42,.05) 1px, transparent 1px); background-size: 100% 100%, 100% 100%, 22px 22px; background-attachment: fixed; }
    .navlink.active { background: hsl(var(--p)); color: #fff; } .navlink.active i { color: #fff; }
  

  </style>
</head>
<body class="bg-base-200 min-h-screen">
  <div class="drawer lg:drawer-open">
    <input id="nav" type="checkbox" class="drawer-toggle" />
    <div class="drawer-content flex flex-col min-h-screen">

      <header class="navbar bg-base-100 border-b border-base-200 sticky top-0 z-30 px-4">
        <label for="nav" class="btn btn-ghost btn-sm btn-circle lg:hidden mr-1"><i data-lucide="menu" class="w-5 h-5"></i></label>
        <div class="flex-1"><h1 class="text-lg font-bold">Khách hàng</h1></div>
        <div class="flex-none gap-1.5">
          <button class="btn btn-primary btn-sm gap-1"><i data-lucide="user-plus" class="w-4 h-4"></i> <span class="hidden sm:inline">Thêm KH</span></button>
          <div class="avatar placeholder"><div class="bg-brand text-white rounded-full w-9"><span class="text-sm">TQ</span></div></div>
        </div>
      </header>

      <main class="p-4 sm:p-6 flex-1 space-y-5">
        <!-- KPI -->
        <div class="grid grid-cols-3 gap-3 sm:gap-4">
          <div class="card bg-base-100 shadow-sm border border-base-200"><div class="card-body p-4"><span class="text-xs text-base-content/50">Tổng khách hàng</span><div class="text-2xl font-bold mt-1">1.284</div></div></div>
          <div class="card bg-base-100 shadow-sm border border-base-200"><div class="card-body p-4"><span class="text-xs text-base-content/50 inline-flex items-center gap-1"><i data-lucide="crown" class="w-3.5 h-3.5 text-warning"></i> Khách VIP</span><div class="text-2xl font-bold mt-1 text-warning">96</div></div></div>
          <div class="card bg-base-100 shadow-sm border border-base-200"><div class="card-body p-4"><span class="text-xs text-base-content/50">Tỉ lệ quay lại</span><div class="text-2xl font-bold mt-1 text-success">42%</div></div></div>
        </div>

        <!-- Tìm kiếm -->
        <label class="input input-bordered flex items-center gap-2 bg-base-100">
          <i data-lucide="search" class="w-4 h-4 text-base-content/40"></i>
          <input id="q" type="text" class="grow" placeholder="Tìm theo tên hoặc số điện thoại…" />
        </label>

        <!-- Danh sách -->
        <div class="card bg-base-100 shadow-sm border border-base-200 overflow-x-auto">
          <table class="table">
            <thead><tr class="text-base-content/60">
              <th>Khách hàng</th><th class="hidden sm:table-cell">SĐT</th><th class="text-center">Lượt</th>
              <th class="hidden md:table-cell text-center">No-show</th><th class="hidden md:table-cell">Lần cuối</th><th>Hạng</th>
            </tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <p class="text-xs text-base-content/40 text-center pt-2">Tác giả: trung.duong (Trum)</p>
      </main>
    </div>

    <div class="drawer-side z-40">
      <label for="nav" class="drawer-overlay"></label>
      <aside class="w-64 min-h-full bg-base-100 border-r border-base-200 flex flex-col">
        <div class="p-4 border-b border-base-200">
          <a href="index.html" class="text-xl font-bold text-brand inline-flex items-center gap-2"><i data-lucide="utensils-crossed" class="w-6 h-6"></i> Booking<span class="text-base-content">Lite</span></a>
          <div class="mt-3 flex items-center gap-2 bg-brand-bg rounded-lg p-2">
            <div class="avatar placeholder"><div class="bg-brand text-white rounded-lg w-9"><span class="text-sm">TQ</span></div></div>
            <div class="leading-tight"><p class="text-sm font-semibold">Trum Quán</p><p class="text-[11px] text-base-content/50">Gói Pro · TP.HCM</p></div>
          </div>
        </div>
        <ul class="menu p-3 gap-1 flex-1 text-[15px]">
          <li><a href="dashboard.html" class="navlink"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Tổng quan</a></li>
          <li><a href="lich.html" class="navlink"><i data-lucide="calendar-days" class="w-5 h-5"></i> Lịch đặt bàn</a></li>
          <li><a href="ban.html" class="navlink"><i data-lucide="grid-3x3" class="w-5 h-5"></i> Sơ đồ bàn</a></li>
          <li><a href="khach-hang.html" class="navlink active"><i data-lucide="contact" class="w-5 h-5"></i> Khách hàng</a></li>
          <li><a href="bao-cao.html" class="navlink"><i data-lucide="bar-chart-3" class="w-5 h-5"></i> Báo cáo</a></li>
          <li><a href="cai-dat.html" class="navlink"><i data-lucide="settings" class="w-5 h-5"></i> Cài đặt quán</a></li>
        </ul>
        <div class="p-3 border-t border-base-200 space-y-1">
          <a href="../end-user/index.html" target="_blank" class="btn btn-outline btn-primary btn-sm btn-block gap-1"><i data-lucide="external-link" class="w-4 h-4"></i> Xem trang đặt bàn</a>
          <a href="index.html" class="btn btn-ghost btn-sm btn-block gap-1 text-base-content/60"><i data-lucide="log-out" class="w-4 h-4"></i> Đăng xuất</a>
        </div>
      </aside>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    const CUS = [
      { name:'Trần Thu Hà', phone:'0912 345 678', visits:14, noshow:0, last:'30/06/2026', tier:'vip' },
      { name:'Hoàng Nam', phone:'0918 246 802', visits:9, noshow:1, last:'30/06/2026', tier:'vip' },
      { name:'Lê Hoàng Anh', phone:'0988 777 666', visits:6, noshow:0, last:'28/06/2026', tier:'reg' },
      { name:'Vũ Đức Thắng', phone:'0966 888 999', visits:5, noshow:0, last:'30/06/2026', tier:'reg' },
      { name:'Phạm Thị Lan', phone:'0977 555 444', visits:3, noshow:2, last:'25/06/2026', tier:'reg' },
      { name:'Nguyễn Văn Minh', phone:'0903 222 111', visits:2, noshow:0, last:'30/06/2026', tier:'new' },
      { name:'Bùi Khánh Linh', phone:'0945 678 901', visits:1, noshow:0, last:'30/06/2026', tier:'new' },
    ];
    const TIER = { vip:{l:'VIP',c:'badge-warning',i:'crown'}, reg:{l:'Thân thiết',c:'badge-success badge-outline',i:'heart'}, new:{l:'Mới',c:'badge-ghost',i:'sparkles'} };
    const colors = ['bg-brand','bg-info','bg-success','bg-warning','bg-secondary','bg-accent'];
    function render(list){
      document.getElementById('tbody').innerHTML = list.map((c,i) => {
        const t = TIER[c.tier]; const ini = c.name.split(' ').slice(-1)[0][0];
        return `<tr class="hover">
          <td><div class="flex items-center gap-2">
            <div class="avatar placeholder"><div class="${colors[i%colors.length]} text-white rounded-full w-8"><span class="text-xs">${ini}</span></div></div>
            <span class="font-medium">${c.name}</span></div></td>
          <td class="text-base-content/70 hidden sm:table-cell">${c.phone}</td>
          <td class="text-center font-semibold">${c.visits}</td>
          <td class="text-center hidden md:table-cell ${c.noshow?'text-error':'text-base-content/40'}">${c.noshow}</td>
          <td class="text-base-content/60 hidden md:table-cell">${c.last}</td>
          <td><span class="badge ${t.c} badge-sm gap-1"><i data-lucide="${t.i}" class="w-3 h-3"></i> ${t.l}</span></td>
        </tr>`;
      }).join('') || `<tr><td colspan="6" class="text-center text-base-content/50 py-8">Không tìm thấy khách hàng.</td></tr>`;
      lucide.createIcons();
    }
    document.getElementById('q').addEventListener('input', e => {
      const k = e.target.value.toLowerCase().trim();
      render(CUS.filter(c => c.name.toLowerCase().includes(k) || c.phone.replace(/\s/g,'').includes(k.replace(/\s/g,''))));
    });
    lucide.createIcons(); render(CUS);
  </script>
</body>
</html>
