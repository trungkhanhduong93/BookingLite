<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="trung.duong (Trum)">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta name="theme-color" content="#F26522">
  <title>Chọn giờ — Đặt bàn Nhà hàng Trum Quán</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    [data-theme="light"] { --p: 19 89% 54%; --pf: 19 89% 46%; --pc: 0 0% 100%; }
    html, body { font-family: 'Be Vietnam Pro', sans-serif; }
    body { background-image: radial-gradient(42rem 42rem at 108% -8%, rgba(242,101,34,.20), transparent 60%), radial-gradient(40rem 40rem at -12% 112%, rgba(0,103,177,.18), transparent 62%); background-attachment: fixed; }

    /* Chip giờ */
    .slot.selected { background: hsl(var(--p)); color: #fff; border-color: hsl(var(--p)); }

    /* Chip ngày */
    .date-chip { outline: none; }
    .date-chip:hover { border-color: hsl(var(--p) / .5); }
    .date-chip.selected { background: hsl(var(--p)); border-color: hsl(var(--p)); box-shadow: 0 6px 16px hsl(var(--p) / .35); }
    .date-chip.selected span { color: #fff !important; }

    /* Ẩn thanh cuộn cho dải ngày */
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  

  
    .navlink { transition: background-color 0.2s, color 0.2s; outline: none !important; }
    .navlink:hover:not(.active) { background-color: rgba(242,101,34, 0.08); color: #F26522; }
    .navlink:hover:not(.active) i { color: #F26522; }
  
    /* Ultra-fast native SPA transition */
    .drawer-side { view-transition-name: sidebar; }
    .navbar { view-transition-name: topbar; }
    main { view-transition-name: main-content; }
    @view-transition { navigation: auto; }
    @keyframes fadeScale { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    main { animation: fadeScale 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    ::view-transition-old(root), ::view-transition-new(root) { animation-duration: 0.2s; }
  </style>
  <meta name="view-transition" content="same-origin" />
</head>
<body class="min-h-screen bg-brand-bg sm:flex sm:items-center sm:justify-center sm:py-6">

  <div class="w-full max-w-md mx-auto bg-base-100 flex flex-col h-[100dvh] sm:h-[800px] sm:max-h-[90vh] overflow-hidden shadow-sm sm:rounded-[2rem] sm:shadow-2xl">

    <!-- Header -->
    <div class="navbar bg-base-100 border-b border-base-200 px-3 shrink-0">
      <div class="flex-1 flex items-center">
        <a href="index.html" class="btn btn-ghost btn-sm btn-circle" title="Quay lại trang quán"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
        <span class="font-semibold ml-1">Đặt bàn · Trum Quán</span>
      </div>
      <a href="../index.html" class="btn btn-ghost btn-sm btn-circle" title="Về trang chủ"><i data-lucide="home" class="w-5 h-5"></i></a>
    </div>

    <!-- Steps (bước 1 đang chọn) -->
    <div class="px-6 pt-4 pb-3 shrink-0">
      <div class="relative flex justify-between">
        <div class="absolute top-4 left-10 right-10 h-1 rounded-full bg-base-200"></div>
        <div class="absolute top-4 left-10 h-1 rounded-full bg-brand" style="width:0"></div>
        <!-- 1: hiện tại -->
        <div class="relative z-10 flex flex-col items-center w-20">
          <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-semibold bg-brand text-white ring-4 ring-brand/25">1</div>
          <span class="mt-2 text-[11px] font-semibold text-brand whitespace-nowrap">Chọn giờ</span>
        </div>
        <!-- 2: chưa tới -->
        <div class="relative z-10 flex flex-col items-center w-20">
          <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-semibold bg-base-100 border-2 border-base-300 text-base-content/40">2</div>
          <span class="mt-2 text-[11px] text-base-content/40 whitespace-nowrap">Thông tin</span>
        </div>
        <!-- 3: chưa tới -->
        <div class="relative z-10 flex flex-col items-center w-20">
          <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-semibold bg-base-100 border-2 border-base-300 text-base-content/40">3</div>
          <span class="mt-2 text-[11px] text-base-content/40 whitespace-nowrap">Xác nhận</span>
        </div>
      </div>
    </div>

    <form id="form" class="px-5 flex-1 min-h-0 overflow-y-auto space-y-6 pb-2">

      <!-- Ngày -->
      <div>
        <label class="label"><span class="label-text font-medium inline-flex items-center gap-1.5"><i data-lucide="calendar" class="w-4 h-4 text-brand"></i> Chọn ngày</span></label>
        <div id="dateStrip" class="flex gap-2 overflow-x-auto no-scrollbar pb-2 -mx-1 px-1 cursor-grab select-none">
          <!-- date chips render bằng JS -->
        </div>
        <input type="hidden" id="date">
      </div>

      <!-- Giờ -->
      <div>
        <label class="label"><span class="label-text font-medium inline-flex items-center gap-1.5"><i data-lucide="clock" class="w-4 h-4 text-brand"></i> Chọn khung giờ</span></label>
        <input type="hidden" id="time">
        <div class="grid grid-cols-3 gap-2" id="slots">
          <!-- slots render bằng JS -->
        </div>
        <p id="timeHint" class="text-xs text-error mt-2 hidden">Vui lòng chọn một khung giờ.</p>
      </div>

      <!-- Số khách (stepper) -->
      <div>
        <label class="label"><span class="label-text font-medium inline-flex items-center gap-1.5"><i data-lucide="users" class="w-4 h-4 text-brand"></i> Số khách</span></label>
        <div class="flex items-center justify-between border border-base-300 rounded-xl px-3 py-2.5">
          <button type="button" id="guestMinus" class="btn btn-circle btn-outline btn-primary btn-sm">
            <i data-lucide="minus" class="w-4 h-4"></i>
          </button>
          <div class="text-center leading-tight">
            <div id="guestVal" class="text-2xl font-bold">2</div>
            <div class="text-xs text-base-content/50">người</div>
          </div>
          <button type="button" id="guestPlus" class="btn btn-circle btn-outline btn-primary btn-sm">
            <i data-lucide="plus" class="w-4 h-4"></i>
          </button>
        </div>
        <input type="hidden" id="guests" value="2">
      </div>

    </form>

    <!-- CTA -->
    <div class="bg-base-100 border-t border-base-200 p-4 shrink-0">
      <button form="form" type="submit" class="btn btn-primary btn-block btn-lg">Tiếp tục</button>
      <p class="text-center text-[11px] text-base-content/40 mt-2">Tác giả: trung.duong (Trum)</p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/lucide@0.360.0/dist/umd/lucide.min.js"></script>
  <script>
    lucide.createIcons();

    let prev = {};
    try { prev = JSON.parse(sessionStorage.getItem('booking') || '{}'); } catch (e) {}

    /* ---------- Dải chọn ngày (14 ngày tới) ---------- */
    const WD = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];
    const dateStrip = document.getElementById('dateStrip');
    const dateInput = document.getElementById('date');
    const base = new Date(); base.setHours(0, 0, 0, 0);
    const isoOf = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

    function selectDate(chip) {
      document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      dateInput.value = chip.dataset.iso;
    }

    for (let i = 0; i < 14; i++) {
      const d = new Date(base); d.setDate(base.getDate() + i);
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.dataset.iso = isoOf(d);
      chip.className = 'date-chip flex flex-col items-center justify-center min-w-[60px] h-[74px] rounded-xl border border-base-300 bg-base-100 shrink-0 transition-all';
      chip.innerHTML = `
        <span class="text-[11px] font-medium ${i === 0 ? 'text-brand' : 'text-base-content/50'}">${i === 0 ? 'Hôm nay' : WD[d.getDay()]}</span>
        <span class="text-xl font-bold leading-tight text-base-content">${d.getDate()}</span>
        <span class="text-[10px] text-base-content/40">Th${d.getMonth() + 1}</span>`;
      chip.addEventListener('click', () => selectDate(chip));
      dateStrip.appendChild(chip);
    }

    // Mặc định: hôm nay; hoặc khôi phục ngày đã chọn
    const chips = [...document.querySelectorAll('.date-chip')];
    const savedChip = prev.date ? chips.find(c => c.dataset.iso === prev.date) : null;
    selectDate(savedChip || chips[0]);
    if (savedChip) savedChip.scrollIntoView({ inline: 'center', block: 'nearest' });

    // Kéo ngang bằng chuột (giữ & rê như trên điện thoại) + cuộn chuột dọc -> ngang.
    // KHÔNG dùng setPointerCapture vì nó "nuốt" click khiến không bấm chọn ngày được;
    // thay vào đó lắng nghe pointermove/up trên window để vẫn kéo mượt ra ngoài vùng.
    function enableDragScroll(el) {
      let down = false, startX = 0, startScroll = 0, moved = false;
      const onMove = (e) => {
        if (!down) return;
        const dx = e.clientX - startX;
        if (Math.abs(dx) > 5) moved = true;
        el.scrollLeft = startScroll - dx;
      };
      const onUp = () => {
        down = false;
        el.classList.remove('cursor-grabbing');
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onUp);
      };
      el.addEventListener('pointerdown', (e) => {
        down = true; moved = false;
        startX = e.clientX; startScroll = el.scrollLeft;
        el.classList.add('cursor-grabbing');
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
      });
      // Chỉ chặn click khi THỰC SỰ kéo (>5px) — click đứng yên vẫn chọn được ngày
      el.addEventListener('click', (e) => {
        if (moved) { e.preventDefault(); e.stopPropagation(); }
      }, true);
      // Lăn chuột dọc -> cuộn ngang
      el.addEventListener('wheel', (e) => {
        if (e.deltaY !== 0) { el.scrollLeft += e.deltaY; e.preventDefault(); }
      }, { passive: false });
    }
    enableDragScroll(dateStrip);

    /* ---------- Khung giờ ---------- */
    const TIMES = ['11:00','11:30','12:00','12:30','17:30','18:00','18:30','19:00','19:30','20:00','20:30','21:00'];
    const slotsEl = document.getElementById('slots');
    const timeEl = document.getElementById('time');
    TIMES.forEach(t => {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = t;
      b.className = 'slot btn btn-sm btn-outline font-normal';
      b.addEventListener('click', () => {
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
        b.classList.add('selected');
        timeEl.value = t;
        document.getElementById('timeHint').classList.add('hidden');
      });
      slotsEl.appendChild(b);
    });
    if (prev.time) {
      const match = [...document.querySelectorAll('.slot')].find(s => s.textContent === prev.time);
      if (match) match.click();
    }

    /* ---------- Stepper số khách ---------- */
    const MAX_GUEST = 20;
    let guestCount = 2;
    const guestVal = document.getElementById('guestVal');
    const guestsInput = document.getElementById('guests');
    const minusBtn = document.getElementById('guestMinus');
    const plusBtn = document.getElementById('guestPlus');

    function renderGuest() {
      const atMax = guestCount >= MAX_GUEST;
      guestVal.textContent = atMax ? MAX_GUEST + '+' : guestCount;
      guestsInput.value = atMax ? MAX_GUEST + '+' : String(guestCount);
      minusBtn.disabled = guestCount <= 1;
      plusBtn.disabled = atMax;
    }
    minusBtn.addEventListener('click', () => { if (guestCount > 1) guestCount--; renderGuest(); });
    plusBtn.addEventListener('click', () => { if (guestCount < MAX_GUEST) guestCount++; renderGuest(); });

    if (prev.guests) guestCount = String(prev.guests).includes('+') ? MAX_GUEST : Math.min(MAX_GUEST, parseInt(prev.guests) || 2);
    renderGuest();

    /* ---------- Submit ---------- */
    document.getElementById('form').addEventListener('submit', (e) => {
      e.preventDefault();
      if (!timeEl.value) {
        document.getElementById('timeHint').classList.remove('hidden');
        return;
      }
      const data = {
        ...prev,
        restaurant: 'Nhà hàng Trum Quán',
        date: dateInput.value,
        time: timeEl.value,
        guests: guestsInput.value
      };
      sessionStorage.setItem('booking', JSON.stringify(data));
      location.href = '2-thong-tin.html';
    });
  </script>

</body>
</html>
