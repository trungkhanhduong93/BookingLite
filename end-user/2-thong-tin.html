<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="trung.duong (Trum)">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta name="theme-color" content="#F26522">
  <title>Thông tin liên hệ — Đặt bàn Nhà hàng Trum Quán</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    [data-theme="light"] { --p: 19 89% 54%; --pf: 19 89% 46%; --pc: 0 0% 100%; }
    html, body { font-family: 'Be Vietnam Pro', sans-serif; }
    body { background-image: radial-gradient(42rem 42rem at 108% -8%, rgba(242,101,34,.20), transparent 60%), radial-gradient(40rem 40rem at -12% 112%, rgba(0,103,177,.18), transparent 62%); background-attachment: fixed; }
  

  
    .navlink { transition: all 0.2s ease-out; }
    .navlink:hover:not(.active) { background-color: rgba(242,101,34, 0.08); color: #F26522; transform: translateX(4px); }
    .navlink:hover:not(.active) i { color: #F26522; }
  
    /* Ultra-fast native SPA transition */
    .drawer-side { view-transition-name: sidebar; }
    .navbar { view-transition-name: topbar; }
    main { view-transition-name: main-content; }
    ::view-transition-old(root), ::view-transition-new(root) { animation-duration: 0.15s; }
  </style>
  <meta name="view-transition" content="same-origin" />
</head>
<body class="min-h-screen bg-brand-bg sm:flex sm:items-center sm:justify-center sm:py-6">

  <div class="w-full max-w-md mx-auto bg-base-100 flex flex-col h-[100dvh] sm:h-[800px] sm:max-h-[90vh] overflow-hidden shadow-sm sm:rounded-[2rem] sm:shadow-2xl">

    <!-- Header -->
    <div class="navbar bg-base-100 border-b border-base-200 px-3 shrink-0">
      <div class="flex-1 flex items-center">
        <a href="1-chon-gio.html" class="btn btn-ghost btn-sm btn-circle" title="Quay lại bước trước"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
        <span class="font-semibold ml-1">Đặt bàn · Trum Quán</span>
      </div>
      <a href="../index.html" class="btn btn-ghost btn-sm btn-circle" title="Về trang chủ"><i data-lucide="home" class="w-5 h-5"></i></a>
    </div>

    <!-- Steps (bước 2 đang chọn) -->
    <div class="px-6 pt-4 pb-3 shrink-0">
      <div class="relative flex justify-between">
        <div class="absolute top-4 left-10 right-10 h-1 rounded-full bg-base-200"></div>
        <div class="absolute top-4 left-10 h-1 rounded-full bg-brand" style="width:calc((100% - 5rem) * 0.5)"></div>
        <!-- 1: đã xong -->
        <div class="relative z-10 flex flex-col items-center w-20">
          <div class="w-8 h-8 rounded-full flex items-center justify-center bg-brand text-white"><i data-lucide="check" class="w-4 h-4"></i></div>
          <span class="mt-2 text-[11px] text-base-content/50 whitespace-nowrap">Chọn giờ</span>
        </div>
        <!-- 2: hiện tại -->
        <div class="relative z-10 flex flex-col items-center w-20">
          <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-semibold bg-brand text-white ring-4 ring-brand/25">2</div>
          <span class="mt-2 text-[11px] font-semibold text-brand whitespace-nowrap">Thông tin</span>
        </div>
        <!-- 3: chưa tới -->
        <div class="relative z-10 flex flex-col items-center w-20">
          <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-semibold bg-base-100 border-2 border-base-300 text-base-content/40">3</div>
          <span class="mt-2 text-[11px] text-base-content/40 whitespace-nowrap">Xác nhận</span>
        </div>
      </div>
    </div>

    <div class="px-5 flex-1 min-h-0 overflow-y-auto space-y-5 pb-2">

      <!-- Tóm tắt lựa chọn -->
      <div class="card bg-brand-bg border border-brand/20">
        <div class="card-body p-4 text-sm gap-2">
          <div class="flex justify-between"><span class="text-base-content/60 inline-flex items-center gap-1.5"><i data-lucide="utensils" class="w-4 h-4"></i> Nhà hàng</span><span id="sumRes" class="font-medium">—</span></div>
          <div class="flex justify-between"><span class="text-base-content/60 inline-flex items-center gap-1.5"><i data-lucide="calendar" class="w-4 h-4"></i> Ngày</span><span id="sumDate" class="font-medium">—</span></div>
          <div class="flex justify-between"><span class="text-base-content/60 inline-flex items-center gap-1.5"><i data-lucide="clock" class="w-4 h-4"></i> Giờ</span><span id="sumTime" class="font-medium">—</span></div>
          <div class="flex justify-between"><span class="text-base-content/60 inline-flex items-center gap-1.5"><i data-lucide="users" class="w-4 h-4"></i> Số khách</span><span id="sumGuests" class="font-medium">—</span></div>
        </div>
      </div>

      <!-- Đăng nhập nhanh (mock) -->
      <button id="quickLogin" type="button" class="btn btn-outline btn-block gap-2">
        <i data-lucide="zap" class="w-4 h-4"></i> Đăng nhập nhanh để điền sẵn
      </button>
      <div class="divider text-xs text-base-content/40">hoặc nhập thủ công</div>

      <!-- Form thông tin -->
      <form id="form" class="space-y-4">
        <div>
          <label class="label"><span class="label-text font-medium">Họ và tên *</span></label>
          <input id="name" type="text" required placeholder="Nguyễn Văn A" class="input input-bordered w-full" />
        </div>
        <div>
          <label class="label"><span class="label-text font-medium">Số điện thoại *</span></label>
          <input id="phone" type="tel" required placeholder="09xx xxx xxx" pattern="[0-9 ]{8,15}" class="input input-bordered w-full" />
        </div>
        <div>
          <label class="label"><span class="label-text font-medium">Ghi chú (tuỳ chọn)</span></label>
          <textarea id="note" placeholder="Ví dụ: cần ghế em bé, bàn gần cửa sổ…" class="textarea textarea-bordered w-full"></textarea>
        </div>
      </form>

    </div>

    <!-- CTA -->
    <div class="bg-base-100 border-t border-base-200 p-4 shrink-0">
      <button form="form" type="submit" class="btn btn-primary btn-block btn-lg">Xác nhận đặt bàn</button>
      <p class="text-center text-[11px] text-base-content/40 mt-2">Tác giả: trung.duong (Trum)</p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/lucide@0.360.0/dist/umd/lucide.min.js"></script>
  <script>
    lucide.createIcons();

    // Đọc dữ liệu bước trước
    let data = {};
    try { data = JSON.parse(sessionStorage.getItem('booking') || '{}'); } catch (e) {}

    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso + 'T00:00:00');
      const thu = ['Chủ nhật','Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7'][d.getDay()];
      return `${thu}, ${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    }
    function guestLabel(g) {
      if (!g) return '—';
      g = String(g);
      return g.includes('+') ? 'Trên ' + g.replace('+', '') + ' người' : g + ' người';
    }

    document.getElementById('sumRes').textContent = data.restaurant || 'Nhà hàng Trum Quán';
    document.getElementById('sumDate').textContent = fmtDate(data.date);
    document.getElementById('sumTime').textContent = data.time || '—';
    document.getElementById('sumGuests').textContent = guestLabel(data.guests);

    // Khôi phục thông tin đã nhập (nếu quay lại)
    if (data.name) document.getElementById('name').value = data.name;
    if (data.phone) document.getElementById('phone').value = data.phone;
    if (data.note) document.getElementById('note').value = data.note;

    // Đăng nhập nhanh (mock) — điền sẵn dummy
    document.getElementById('quickLogin').addEventListener('click', () => {
      document.getElementById('name').value = 'Trần Thu Hà';
      document.getElementById('phone').value = '0912 345 678';
    });

    // Submit → merge thông tin → bước 3
    document.getElementById('form').addEventListener('submit', (e) => {
      e.preventDefault();
      const merged = {
        ...data,
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        note: document.getElementById('note').value.trim()
      };
      sessionStorage.setItem('booking', JSON.stringify(merged));
      location.href = '3-xac-nhan.html';
    });
  </script>

</body>
</html>
